<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icons = {
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
            Edit: () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>,
            ShopBag: () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>,
            Wallet: () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9.42a2 2 0 0 0-1.5-1.92L4.5 6"/><path d="M15 13h2"/><path d="M15 17h2"/></svg>,
            Bot: () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/><path d="M12 2v2"/><path d="M12 8v0"/></svg>,
            Calendar: () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></svg>,
            Archive: () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="5" x="2" y="3" rx="1"/><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"/><path d="M10 12h4"/></svg>,
            Send: () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>,
            Warn: () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>,
            Gear: () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>,
            ChevronUp: () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m18 15-6-6-6 6"/></svg>,
            ChevronDown: () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        };

        const initialItems = ["Ayam Gede (Mentah)", "Lele Segar", "Telur Ayam", "Beras", "Minyak Goreng", "Gula Pasir", "Gas LPG 3Kg", "Sabun Cuci", "Lunch Box Size M", "Cup Minum", "Kangkung", "Tahu Putih (Mentah)"];
        const incomeTypes = ["Shopeefood", "Grabfood", "Gofood", "Offline Cash", "Offline QRIS"];
        const commonUnits = ['Kg', 'Pcs', 'Gram', 'Liter', 'Ikat', 'Bungkus', 'Pack'];

        // Initial Settings
        const defaultSettings = { targetOmzet: 500000, maxBelanja: 300000, saldoAwal: 1000000 };

        // Helper timezone local format (YYYY-MM-DD)
        const getLocalDateStr = (d = new Date()) => {
            const date = new Date(d);
            return new Date(date.getTime() - (date.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
        };

        // --- ENVIRONMENT DETECTION ---
        let isLocalMode = false;
        let auth, db;
        let appId = 'q-nota-local';

        try {
            const firebaseConfig = JSON.parse(__firebase_config);
            appId = typeof __app_id !== 'undefined' ? __app_id : 'q-nota-app';
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();
        } catch (e) {
            isLocalMode = true;
        }

        const App = () => {
            const [activeTab, setActiveTab] = useState('assistant');
            const [status, setStatus] = useState({ show: false, message: '', type: 'success' });
            const [showNav, setShowNav] = useState(true);
            
            // --- DATA STATES ---
            const [cart, setCart] = useState(() => JSON.parse(localStorage.getItem('fin-cart') || '[]'));
            const [history, setHistory] = useState(() => JSON.parse(localStorage.getItem('fin-history') || '[]'));
            const [incomes, setIncomes] = useState(() => JSON.parse(localStorage.getItem('fin-incomes') || '[]'));
            const [agendas, setAgendas] = useState(() => JSON.parse(localStorage.getItem('fin-agendas') || '[]'));
            const [itemsDB, setItemsDB] = useState(() => JSON.parse(localStorage.getItem('fin-master') || JSON.stringify(initialItems)));
            const [settings, setSettings] = useState(() => JSON.parse(localStorage.getItem('fin-settings') || JSON.stringify(defaultSettings)));
            
            const [user, setUser] = useState(null);

            // --- CHAT & AI STATE ---
            const [chats, setChats] = useState([]);
            const [chatInput, setChatInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const chatEndRef = useRef(null);

            // --- PLAN STATES ---
            const [editingId, setEditingId] = useState(null);
            const [itemName, setItemName] = useState('');
            const [qty, setQty] = useState('');
            const [unit, setUnit] = useState('Kg');
            const [totalNominal, setTotalNominal] = useState('');
            const [transactionDate, setTransactionDate] = useState(getLocalDateStr());
            const [showSuggestions, setShowSuggestions] = useState(false);
            const [currentNoteId, setCurrentNoteId] = useState(null);

            // --- INCOME STATES ---
            const [incomeDate, setIncomeDate] = useState(getLocalDateStr());
            const [incomeSource, setIncomeSource] = useState('');
            const [incomeAmount, setIncomeAmount] = useState('');
            const [showIncomeSuggestions, setShowIncomeSuggestions] = useState(false);

            // --- AGENDA STATES ---
            const [agendaDate, setAgendaDate] = useState(getLocalDateStr());
            const [agendaTitle, setAgendaTitle] = useState('');
            const [agendaAmount, setAgendaAmount] = useState('');
            const [agendaType, setAgendaType] = useState('keluar');
            const [reminderModal, setReminderModal] = useState({ show: false, items: [] });
            const hasCheckedAgenda = useRef(false);

            const [confirmModal, setConfirmModal] = useState({ show: false, title: '', message: '', onConfirm: null });
            const [showSettings, setShowSettings] = useState(false);
            const [isSaving, setIsSaving] = useState(false);

            const formatNumber = (num) => new Intl.NumberFormat('id-ID').format(num);
            const showStatus = (message, type = 'success') => {
                setStatus({ show: true, message, type });
                setTimeout(() => setStatus(prev => ({ ...prev, show: false })), 2000);
            };

            const paths = useMemo(() => {
                if (isLocalMode || !user) return null;
                return { history: `artifacts/${appId}/users/${user.uid}/history`, master: `artifacts/${appId}/users/${user.uid}/master/data`, cart: `artifacts/${appId}/users/${user.uid}/current/cart` };
            }, [user]);

            // Calculate Current Actual Balance
            const currentBalance = useMemo(() => {
                const totalIn = incomes.reduce((sum, inc) => sum + inc.amount, 0);
                const totalOut = history.reduce((sum, exp) => sum + exp.total, 0);
                return settings.saldoAwal + totalIn - totalOut;
            }, [incomes, history, settings]);

            // Sync to LocalStorage
            useEffect(() => { localStorage.setItem('fin-cart', JSON.stringify(cart)); }, [cart]);
            useEffect(() => { localStorage.setItem('fin-history', JSON.stringify(history)); }, [history]);
            useEffect(() => { localStorage.setItem('fin-incomes', JSON.stringify(incomes)); }, [incomes]);
            useEffect(() => { localStorage.setItem('fin-agendas', JSON.stringify(agendas)); }, [agendas]);
            useEffect(() => { localStorage.setItem('fin-master', JSON.stringify(itemsDB)); }, [itemsDB]);
            useEffect(() => { localStorage.setItem('fin-settings', JSON.stringify(settings)); }, [settings]);

            useEffect(() => { if (activeTab === 'assistant') chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [chats, isTyping, activeTab]);

            // Load Cloud Data
            useEffect(() => {
                const login = async () => {
                    if (isLocalMode) { setUser({ uid: 'local_user', displayName: 'Guest' }); return; }
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await auth.signInWithCustomToken(__initial_auth_token);
                        else await auth.signInAnonymously();
                    } catch (e) { console.error(e); }
                };
                login();
                if (!isLocalMode) return auth.onAuthStateChanged(setUser);
            }, []);

            useEffect(() => {
                if (isLocalMode || !user || !paths) return;
                const unsubHistory = db.collection(paths.history).onSnapshot(snap => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setHistory(data.sort((a, b) => b.timestamp - a.timestamp));
                });
                return () => unsubHistory();
            }, [user, paths]);

            // --- PROACTIVE REMINDER LOGIC (ALARM TAGIHAN) ---
            useEffect(() => {
                if (hasCheckedAgenda.current) return;
                
                const checkAgendas = () => {
                    const today = new Date();
                    today.setHours(0,0,0,0);
                    const threeDays = new Date(today);
                    threeDays.setDate(today.getDate() + 3);

                    const pending = agendas.filter(a => {
                        if (a.isPaid) return false;
                        const aDate = new Date(a.date);
                        aDate.setHours(0,0,0,0);
                        return aDate <= threeDays;
                    });

                    if (pending.length > 0) {
                        setReminderModal({ show: true, items: pending });
                        hasCheckedAgenda.current = true;
                    } else if (agendas.length > 0) {
                        hasCheckedAgenda.current = true; // Data exists but no pending, mark as checked
                    }
                };
                
                const timer = setTimeout(checkAgendas, 1500); // Wait 1.5s after load
                return () => clearTimeout(timer);
            }, [agendas]);

            // --- AI & CHAT LOGIC ---
            useEffect(() => {
                if (chats.length === 0) {
                    let greeting = `Halo Bos! Kas kita saat ini **Rp ${formatNumber(currentBalance)}**.\n\nSemua aman terkendali. Bos bisa cek cash flow di menu bawah, atau ngobrol langsung sama Fin buat tanya soal keadaan bisnis saat ini. Fin siap mikir! 🧠`;
                    setChats([{ id: Date.now(), sender: 'fin', text: greeting, type: 'text' }]);
                }
            }, []);

            // GEMINI PRO (AI) Integration
            const fetchFinAI = async (userText) => {
                const apiKey = "";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                const safeIncomes = incomes || [];
                const safeHistory = history || [];
                const safeAgendas = agendas || [];

                const todayStr = getLocalDateStr();
                const recentIncomes = safeIncomes.slice(0, 5).map(i => `${i.date}: ${i.source} (+Rp${i.amount})`);
                const recentExpenses = safeHistory.slice(0, 5).map(h => `${h.date}: Belanja (-Rp${h.total})`);
                const pendingBills = safeAgendas.filter(a => !a.isPaid).map(a => `[${a.date}] ${a.title} (Rp${a.amount})`);

                const sysPrompt = `Anda adalah "Fin", asisten keuangan AI super cerdas untuk "Warung Mbah Marto".
Gaya bicara: Santai, ceria, proaktif, dan selalu panggil pengguna dengan sebutan "Bos".
Anda sedang menganalisis data bisnis warung Mbah Marto saat ini:
- Saldo Kas Riil saat ini: Rp ${currentBalance}
- Target Omzet Harian: Rp ${settings.targetOmzet}
- Batas Belanja Harian: Rp ${settings.maxBelanja}
- Tagihan Belum Dibayar: ${pendingBills.length > 0 ? pendingBills.join(', ') : 'Tidak ada'}
- Pemasukan Terakhir: ${recentIncomes.length > 0 ? recentIncomes.join(', ') : 'Belum ada'}
- Pengeluaran Terakhir: ${recentExpenses.length > 0 ? recentExpenses.join(', ') : 'Belum ada'}

Tugas Anda:
Jawab pertanyaan Bos berdasarkan data live di atas. Jika ditanya keadaan bisnis, analisis secara kritis apakah saldo kas sehat, peringatkan jika ada tagihan yang mendekati jatuh tempo dan uang tidak cukup, dan berikan insight singkat (misal: kurangi belanja / genjot promo).
Format: Maksimal 2-3 paragraf pendek. Gunakan *italic* atau **bold** sewajarnya untuk highlight nominal. Dilarang keras menggunakan format markdown kompleks atau membuat list bullet yang terlalu panjang.`;

                const payload = {
                    contents: [{ parts: [{ text: userText }] }],
                    systemInstruction: { parts: [{ text: sysPrompt }] }
                };

                let delay = 1000;
                for (let i = 0; i < 5; i++) {
                    try {
                        const res = await fetch(url, { method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'application/json' }});
                        if (!res.ok) throw new Error('API Error');
                        const data = await res.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text || "Maaf Bos, Fin lagi blank nih.";
                    } catch (err) {
                        if (i === 4) return "Waduh Bos, Fin gagal mikir nih (koneksi AI terputus). Coba lagi nanti ya.";
                        await new Promise(r => setTimeout(r, delay));
                        delay *= 2;
                    }
                }
            };

            const generateCashFlowData = (mode) => {
                const today = new Date();
                const year = today.getFullYear();
                const month = today.getMonth();
                
                let startDate, endDate;

                if (mode === 'minggu') {
                    const day = today.getDay(); 
                    const diff = today.getDate() - day + (day === 0 ? -6 : 1);
                    startDate = new Date(year, month, diff);
                    endDate = new Date(startDate);
                    endDate.setDate(startDate.getDate() + 6);
                } else if (mode === 'awal_bulan') {
                    startDate = new Date(year, month, 1);
                    endDate = new Date();
                } else if (mode === 'harian') {
                    startDate = new Date(year, month, today.getDate());
                    endDate = new Date(year, month, today.getDate() + 6);
                } else { // bulan_penuh
                    startDate = new Date(year, month, 1);
                    endDate = new Date(year, month + 1, 0);
                }

                const startStr = getLocalDateStr(startDate);
                const beforeStartIncomes = incomes.filter(i => i.date < startStr).reduce((s, i) => s + i.amount, 0);
                const beforeStartExpenses = history.filter(h => h.date < startStr).reduce((s, h) => s + h.total, 0);
                
                let runningBalance = settings.saldoAwal + beforeStartIncomes - beforeStartExpenses;

                let reportDays = [];
                let totalActualInc = 0;
                let totalActualExp = 0;
                let actualDaysCount = 0;

                for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
                    let dStr = getLocalDateStr(d);
                    let isFuture = dStr > getLocalDateStr(today);
                    let isToday = dStr === getLocalDateStr(today);

                    let actualInc = incomes.filter(i => i.date === dStr).reduce((s, i) => s + i.amount, 0);
                    let actualExp = history.filter(h => h.date === dStr).reduce((s, h) => s + h.total, 0);
                    let hasInc = incomes.some(i => i.date === dStr);
                    let hasExp = history.some(h => h.date === dStr);

                    if (!isFuture && (hasInc || hasExp || isToday)) {
                        totalActualInc += actualInc;
                        totalActualExp += actualExp;
                        actualDaysCount++;
                    }

                    let dailyIn = (isFuture && !hasInc) ? settings.targetOmzet : actualInc;
                    let dailyOut = (isFuture && !hasExp) ? settings.maxBelanja : actualExp;

                    let dayAgendas = agendas.filter(a => a.date === dStr && (!a.isPaid || isFuture));
                    dayAgendas.forEach(ag => {
                        if (ag.type === 'keluar') dailyOut += ag.amount;
                        else dailyIn += ag.amount;
                    });

                    let saldoPagi = runningBalance;
                    let saldoSetelahBelanja = saldoPagi - dailyOut; 
                    runningBalance = saldoPagi - dailyOut + dailyIn;

                    reportDays.push({
                        date: dStr,
                        displayDate: d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' }),
                        isToday,
                        isFuture,
                        saldoPagi,
                        dailyOut,
                        saldoSetelahBelanja,
                        dailyIn,
                        saldoAkhir: runningBalance,
                        isCritical: saldoSetelahBelanja < 100000
                    });
                }

                const avgInc = actualDaysCount > 0 ? (totalActualInc / actualDaysCount) : settings.targetOmzet;
                const avgExp = actualDaysCount > 0 ? (totalActualExp / actualDaysCount) : settings.maxBelanja;
                const projectedFinal = reportDays.length > 0 ? reportDays[reportDays.length - 1].saldoAkhir : currentBalance;

                return { days: reportDays, avgInc, avgExp, projectedFinal, mode };
            };

                                    <div className="text-center py-20 bg-white rounded-[2.5rem] border border-dashed border-slate-200 mx-2">
                                        <div className="w-10 h-10 mx-auto text-slate-200 mb-3"><Icons.Archive /></div>
                                        <p className="text-slate-300 font-bold uppercase text-[10px] tracking-widest">Belum ada arsip belanja</p>
                                    </div>
                                ) : (
                                    history.map(note => (
                                        <div key={note.id} className="bg-white p-5 rounded-[2.2rem] border border-slate-100 shadow-sm relative overflow-hidden mb-4">
                                            <div className="flex justify-between items-center mb-5">
                                                <span className="text-[10px] font-black text-indigo-600 bg-indigo-50 px-4 py-1.5 rounded-full uppercase tracking-widest font-mono italic">
                                                    {new Date(note.date).toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year: 'numeric'})}
                                                </span>
                                                <span className="font-black text-slate-900">Rp {formatNumber(note.total)}</span>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => { setCart(note.items); setTransactionDate(note.date); setCurrentNoteId(note.id); setActiveTab('plan'); showStatus('Mode Edit Arsip'); }} className="flex-1 bg-slate-900 text-white py-3 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-slate-800 transition-colors shadow-md">LIHAT DETAIL & EDIT</button>
                                                <button onClick={() => triggerDeleteHistory(note.id)} className="w-12 bg-red-50 text-red-500 rounded-xl flex justify-center items-center hover:bg-red-100 transition-colors"><div className="w-5 h-5"><Icons.Trash /></div></button>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                    </main>

                    {/* Tombol Tampilkan Menu (Muncul saat Nav disembunyikan) */}
                    <div className={`fixed left-1/2 -translate-x-1/2 z-[160] transition-all duration-500 ease-in-out ${showNav ? 'bottom-28 opacity-0 pointer-events-none translate-y-10' : 'bottom-6 opacity-100 translate-y-0'}`}>
                        <button onClick={() => setShowNav(true)} className="bg-slate-900/90 backdrop-blur-md text-white px-5 py-3 rounded-full shadow-2xl border border-slate-700/50 flex items-center gap-2 hover:bg-slate-800 transition-colors hover:scale-105 active:scale-95">
                            <div className="w-5 h-5"><Icons.ChevronUp /></div>
                            <span className="text-[11px] font-black uppercase tracking-widest">Menu Utama</span>
                        </button>
                    </div>

                    {/* Navbar Bawah */}
                    <nav className={`fixed left-1/2 -translate-x-1/2 w-[95%] max-w-[420px] glass-nav rounded-[2.5rem] flex justify-between px-3 py-2 z-[150] shadow-2xl border border-slate-700/50 transition-all duration-500 ease-in-out ${showNav ? 'bottom-6 translate-y-0 opacity-100' : '-bottom-32 translate-y-full opacity-0 pointer-events-none'}`}>
                        {/* Tab Toggle Sembunyikan Menu */}
                        <div className="absolute -top-4 left-1/2 -translate-x-1/2">
                            <button onClick={() => setShowNav(false)} className="w-16 h-5 bg-slate-900/95 backdrop-blur-md rounded-t-full flex items-center justify-center border-t border-x border-slate-700/50 text-slate-400 hover:text-white transition-colors cursor-pointer group shadow-lg">
                                <div className="w-4 h-4 group-hover:translate-y-0.5 transition-transform"><Icons.ChevronDown /></div>
                            </button>
                        </div>

                        <button onClick={() => setActiveTab('assistant')} className={`flex-1 py-3 rounded-[2rem] flex flex-col items-center transition-all ${activeTab === 'assistant' ? 'bg-indigo-600 text-white scale-105 shadow-lg shadow-indigo-500/30' : 'text-slate-400 hover:text-white'}`}>
                            <div className="w-5 h-5"><Icons.Bot /></div><span className="text-[7px] font-black uppercase mt-1 tracking-widest">Fin</span>
                        </button>
                        <button onClick={() => setActiveTab('plan')} className={`flex-1 py-3 rounded-[2rem] flex flex-col items-center transition-all ${activeTab === 'plan' ? 'bg-indigo-600 text-white scale-105 shadow-lg shadow-indigo-500/30' : 'text-slate-400 hover:text-white'}`}>
                            <div className="w-5 h-5"><Icons.ShopBag /></div><span className="text-[7px] font-black uppercase mt-1 tracking-widest">Belanja</span>
                        </button>
                        <button onClick={() => setActiveTab('income')} className={`flex-1 py-3 rounded-[2rem] flex flex-col items-center transition-all ${activeTab === 'income' ? 'bg-indigo-600 text-white scale-105 shadow-lg shadow-indigo-500/30' : 'text-slate-400 hover:text-white'}`}>
                            <div className="w-5 h-5"><Icons.Wallet /></div><span className="text-[7px] font-black uppercase mt-1 tracking-widest">Income</span>
                        </button>
                        <button onClick={() => setActiveTab('agenda')} className={`flex-1 py-3 rounded-[2rem] flex flex-col items-center transition-all ${activeTab === 'agenda' ? 'bg-indigo-600 text-white scale-105 shadow-lg shadow-indigo-500/30' : 'text-slate-400 hover:text-white'}`}>
                            <div className="w-5 h-5"><Icons.Calendar /></div><span className="text-[7px] font-black uppercase mt-1 tracking-widest">Agenda</span>
                        </button>
                        <button onClick={() => setActiveTab('arsip')} className={`flex-1 py-3 rounded-[2rem] flex flex-col items-center transition-all ${activeTab === 'arsip' ? 'bg-indigo-600 text-white scale-105 shadow-lg shadow-indigo-500/30' : 'text-slate-400 hover:text-white'}`}>
                            <div className="w-5 h-5"><Icons.Archive /></div><span className="text-[7px] font-black uppercase mt-1 tracking-widest">Arsip</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
